apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopsprojet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devopsprojet
  template:
    metadata:
      labels:
        app: devopsprojet
    spec:
      containers:
        - name: devopsprojet
          image: balsembalsem/devopsprojet:3.0.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/devopsdb
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
---
apiVersion: v1
kind: Service
metadata:
  name: devopsprojet-service
spec:
  type: NodePort
  selector:
    app: devopsprojet
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30007
